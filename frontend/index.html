<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>InvPos - Inventory & POS System</title>
    <style>
      #web-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #9333EA 100%);
        font-family: 'Segoe UI', Arial, sans-serif;
        user-select: none;
        transition: opacity 0.5s ease-out;
      }
      #web-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #web-splash .splash-logo {
        width: 140px;
        height: 140px;
        background: rgba(255,255,255,0.1);
        border-radius: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255,255,255,0.2);
        animation: splash-pulse 2s ease-in-out infinite;
      }
      #web-splash .splash-logo svg {
        width: 96px;
        height: 96px;
      }
      @keyframes splash-pulse {
        0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.1); }
        50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(255,255,255,0.1); }
      }
      #web-splash .splash-name {
        font-size: 38px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 2px;
        margin-top: 24px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      }
      #web-splash .splash-tag {
        font-size: 15px;
        color: rgba(255,255,255,0.7);
        margin-top: 4px;
      }
      #web-splash .splash-loader {
        width: 180px;
        height: 4px;
        background: rgba(255,255,255,0.15);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 20px;
      }
      #web-splash .splash-loader-bar {
        width: 40%;
        height: 100%;
        background: #fff;
        border-radius: 4px;
        animation: splash-loading 1.5s ease-in-out infinite;
      }
      @keyframes splash-loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      #web-splash .splash-version {
        position: absolute;
        bottom: 20px;
        font-size: 12px;
        color: rgba(255,255,255,0.4);
      }
    </style>
  </head>
  <body>
    <div id="web-splash">
      <div class="splash-logo">
        <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#FFFFFF"/>
              <stop offset="100%" style="stop-color:#E0E7FF"/>
            </linearGradient>
          </defs>
          <g transform="translate(96,100)">
            <path d="M40 40 L80 40 L120 200 L280 200 L310 80 L100 80" stroke="url(#sbg)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="30" cy="35" r="12" fill="url(#sbg)"/>
            <circle cx="140" cy="240" r="22" fill="url(#sbg)"/>
            <circle cx="260" cy="240" r="22" fill="url(#sbg)"/>
            <circle cx="140" cy="240" r="8" fill="#4F46E5"/>
            <circle cx="260" cy="240" r="8" fill="#4F46E5"/>
          </g>
          <text x="256" y="430" font-family="Arial" font-size="72" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="8">POS</text>
        </svg>
      </div>
      <div class="splash-name">InvPos</div>
      <div class="splash-tag">Inventory &amp; Point of Sale System</div>
      <div class="splash-loader"><div class="splash-loader-bar"></div></div>
      <div class="splash-version">Version 1.0.0</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
